<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Reconocimiento de Mano - AR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* Video de la cámara */
        #camera-feed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 1;
            transform: scaleX(-1); /* Espejo horizontal */
        }

        /* Canvas para dibujar la mano */
        #hand-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2;
            transform: scaleX(-1); /* Espejo horizontal */
        }

        /* Panel lateral que replica la mano */
        #hand-mirror {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 180px;
            height: 240px;
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #00ff88;
            border-radius: 15px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }

        #hand-mirror h3 {
            color: #00ff88;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #hand-mirror canvas {
            width: 150px;
            height: 200px;
            background: #111;
            border-radius: 10px;
        }

        /* Información de la mano */
        #hand-info {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #00ccff;
            border-radius: 15px;
            padding: 20px;
            z-index: 10;
            color: #fff;
            font-size: 14px;
            min-width: 200px;
        }

        #hand-info h3 {
            color: #00ccff;
            font-size: 16px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 5px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .info-label {
            color: #888;
        }

        .info-value {
            color: #00ff88;
            font-weight: bold;
        }

        /* Estado */
        #status {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 12px 25px;
            border-radius: 25px;
            z-index: 100;
            font-size: 14px;
            border: 2px solid #00ff88;
        }

        #status.detecting {
            border-color: #00ff88;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 255, 136, 0.5); }
            50% { box-shadow: 0 0 25px rgba(0, 255, 136, 0.8); }
        }

        /* Botón de inicio */
        #start-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #000;
            border: none;
            padding: 18px 50px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 5px 30px rgba(0, 255, 136, 0.5);
        }

        #start-btn:hover {
            transform: translateX(-50%) scale(1.05);
        }

        #start-btn:disabled {
            background: #444;
            cursor: not-allowed;
        }

        /* Loading */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 200;
            text-align: center;
            color: #fff;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #333;
            border-top: 4px solid #00ff88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Video de la cámara -->
    <video id="camera-feed" autoplay playsinline></video>
    
    <!-- Canvas principal para dibujar sobre el video -->
    <canvas id="hand-canvas"></canvas>

    <!-- Panel lateral con mano espejo -->
    <div id="hand-mirror">
        <h3>🖐️ Mano</h3>
        <canvas id="mirror-canvas"></canvas>
    </div>

    <!-- Información de la mano -->
    <div id="hand-info">
        <h3>📊 Datos</h3>
        <div class="info-row">
            <span class="info-label">Detectada:</span>
            <span class="info-value" id="detected">No</span>
        </div>
        <div class="info-row">
            <span class="info-label">Posición X:</span>
            <span class="info-value" id="pos-x">0</span>
        </div>
        <div class="info-row">
            <span class="info-label">Posición Y:</span>
            <span class="info-value" id="pos-y">0</span>
        </div>
        <div class="info-row">
            <span class="info-label">Profundidad Z:</span>
            <span class="info-value" id="pos-z">0</span>
        </div>
        <div class="info-row">
            <span class="info-label">Dedos:</span>
            <span class="info-value" id="fingers">0/5</span>
        </div>
        <div class="info-row">
            <span class="info-label">Gestos:</span>
            <span class="info-value" id="gesture">-</span>
        </div>
    </div>

    <!-- Estado -->
    <div id="status">Cargando modelo...</div>

    <!-- Loading -->
    <div id="loading">
        <div class="spinner"></div>
        <p>Cargando reconocimiento de mano...</p>
    </div>

    <!-- Botón de inicio -->
    <button id="start-btn" disabled>⏳ Cargando...</button>

    <!-- MediaPipe Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script>
        const HAND_CONNECTORS = [
        [0,1],[1,2],[2,3],[3,4],      // Pulgar
        [0,5],[5,6],[6,7],[7,8],      // Índice
        [0,9],[9,10],[10,11],[11,12], // Medio
        [0,13],[13,14],[14,15],[15,16], // Anular
        [0,17],[17,18],[18,19],[19,20], // Meñique
        [5,9],[9,13],[13,17]            // Palma
        ];
        // Elementos del DOM
        const video = document.getElementById('camera-feed');
        const canvas = document.getElementById('hand-canvas');
        const ctx = canvas.getContext('2d');
        const mirrorCanvas = document.getElementById('mirror-canvas');
        const mirrorCtx = mirrorCanvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');
        const loadingEl = document.getElementById('loading');

        // Elementos de información
        const detectedEl = document.getElementById('detected');
        const posXEl = document.getElementById('pos-x');
        const posYEl = document.getElementById('pos-y');
        const posZEl = document.getElementById('pos-z');
        const fingersEl = document.getElementById('fingers');
        const gestureEl = document.getElementById('gesture');

        // Variables de estado
        let isRunning = false;
        let animationId = null;

        // Configurar tamaño del canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            mirrorCanvas.width = 150;
            mirrorCanvas.height = 200;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Inicializar MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        // Configurar Hands
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            smoothLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        // Procesar resultados
        hands.onResults(onResults);

        // Función principal cuando se procesa un frame
        function onResults(results) {
            // Limpiar canvas principal
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Limpiar canvas espejo
            mirrorCtx.clearRect(0, 0, mirrorCanvas.width, mirrorCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // Dibujar mano en el video principal
                drawConnectors(ctx, landmarks, HAND_CONNECTORS, 
                    {color: '#00ff88', lineWidth: 3});
                drawLandmarks(ctx, landmarks, 
                    {color: '#00ccff', lineWidth: 2, radius: 5});
                
                // Dibujar mano en el panel espejo
                drawHandMirror(landmarks);
                
                // Actualizar información
                updateHandInfo(landmarks);
                
                statusEl.textContent = '🟢 Mano detectada';
                statusEl.classList.add('detecting');
                detectedEl.textContent = 'Sí';
                detectedEl.style.color = '#00ff88';
            } else {
                statusEl.textContent = '🔴 Buscando mano...';
                statusEl.classList.remove('detecting');
                detectedEl.textContent = 'No';
                detectedEl.style.color = '#ff4444';
                gestureEl.textContent = '-';
            }
        }

        // Dibujar mano en el panel espejo
        function drawHandMirror(landmarks) {
            const scaleX = mirrorCanvas.width / canvas.width;
            const scaleY = mirrorCanvas.height / canvas.height;
            
            // Fondo del espejo
            mirrorCtx.fillStyle = '#111';
            mirrorCtx.fillRect(0, 0, mirrorCanvas.width, mirrorCanvas.height);
            
            // Dibujar conectores
            mirrorCtx.strokeStyle = '#00ff88';
            mirrorCtx.lineWidth = 2;
            
            HAND_CONNECTORS.forEach(([i, j]) => {
                const p1 = landmarks[i];
                const p2 = landmarks[j];
                mirrorCtx.beginPath();
                mirrorCtx.moveTo(p1.x * mirrorCanvas.width, p1.y * mirrorCanvas.height);
                mirrorCtx.lineTo(p2.x * mirrorCanvas.width, p2.y * mirrorCanvas.height);
                mirrorCtx.stroke();
            });
            
            // Dibujar puntos
            mirrorCtx.fillStyle = '#00ccff';
            landmarks.forEach((landmark) => {
                mirrorCtx.beginPath();
                mirrorCtx.arc(
                    landmark.x * mirrorCanvas.width,
                    landmark.y * mirrorCanvas.height,
                    4, 0, 2 * Math.PI
                );
                mirrorCtx.fill();
            });
        }

        // Actualizar información de la mano
        function updateHandInfo(landmarks) {
            // Obtener coordenadas de la muñeca
            const wrist = landmarks[0];
            
            // Posición (normalizada 0-1)
            posXEl.textContent = (wrist.x * 100).toFixed(1) + '%';
            posYEl.textContent = (wrist.y * 100).toFixed(1) + '%';
            
            // Calcular profundidad basada en el tamaño de la mano
            const handSize = calculateHandSize(landmarks);
            posZEl.textContent = handSize.toFixed(2) + ' (lejanía)';
            
            // Contar dedos extendidos
            const fingersUp = countFingers(landmarks);
            fingersEl.textContent = fingersUp + '/5';
            
            // Detectar gesto
            const gesture = detectGesture(landmarks, fingersUp);
            gestureEl.textContent = gesture;
        }

        // Calcular tamaño de la mano (profundidad)
        function calculateHandSize(landmarks) {
            const wrist = landmarks[0];
            const middleFinger = landmarks[12];
            const distance = Math.sqrt(
                Math.pow(middleFinger.x - wrist.x, 2) + 
                Math.pow(middleFinger.y - wrist.y, 2)
            );
            return 1 / (distance + 0.01); // Inverso para mayor = más cerca
        }

        // Contar dedos extendidos
        function countFingers(landmarks) {
            let count = 0;
            
            // Pulgar (comparar con posición lateral)
            if (landmarks[4].x < landmarks[3].x) count++;
            
            // Índice (y > y del nudillo)
            if (landmarks[8].y < landmarks[7].y) count++;
            
            // Medio
            if (landmarks[12].y < landmarks[11].y) count++;
            
            // Anular
            if (landmarks[16].y < landmarks[15].y) count++;
            
            // Meñique
            if (landmarks[20].y < landmarks[19].y) count++;
            
            return count;
        }

        // Detectar gesto
        function detectGesture(landmarks, fingersUp) {
            const fingerTips = [landmarks[4], landmarks[8], landmarks[12], landmarks[16], landmarks[20]];
            const fingerBases = [landmarks[2], landmarks[6], landmarks[10], landmarks[14], landmarks[18]];
            
            // Puño cerrado
            if (fingersUp === 0) return '👊 Puño';
            
            // Mano abierta
            if (fingersUp === 5) return '✋ Abierto';
            
            // Paz ✌️
            if (fingersUp === 2 && landmarks[8].y < landmarks[6].y && landmarks[12].y < landmarks[10].y) {
                return '✌️ Paz';
            }
            
            // OK 👌
            if (fingersUp === 1 && Math.abs(landmarks[4].x - landmarks[8].x) < 0.05) {
                return '👌 OK';
            }
            
            // Like 👍
            if (fingersUp === 1 && landmarks[4].y < landmarks[3].y) {
                return '👍 Like';
            }
            
            // Palo ✋
            if (fingersUp === 1 && landmarks[8].y < landmarks[6].y) {
                return '☝️ Índice';
            }
            
            return '🖐️ ' + fingersUp + ' dedos';
        }

        // Iniciar cámara
        async function startCamera() {
            const camera = new Camera(video, {
                onFrame: async () => {
                    await hands.send({image: video});
                },
                width: 1280,
                height: 720
            });
            await camera.start();
        }

        // Evento del botón
        startBtn.addEventListener('click', async () => {
            if (isRunning) return;
            isRunning = true;
            startBtn.disabled = true;
            statusEl.textContent = '📷 Iniciando cámara...';
            
            try {
                await startCamera();
                startBtn.style.display = 'none';
                loadingEl.classList.add('hidden');
                statusEl.textContent = '🔍 Buscando mano...';
            } catch (error) {
                statusEl.textContent = '❌ Error: ' + error.message;
                startBtn.disabled = false;
                console.error('Error cámara:', error);
            }
        });

        // Loading inicial - verificar que los scripts estén cargados
        window.addEventListener('load', async () => {
            statusEl.textContent = '⏳ Verificando modelos...';
            
            // Verificar que MediaPipe esté disponible
            if (typeof Hands === 'undefined') {
                statusEl.textContent = '❌ Error: MediaPipe no cargado';
                console.error('Hands no definido');
                return;
            }
            
            try {
                // Procesar un frame vacío para cargar el modelo
                const emptyImg = createEmptyImage();
                await hands.send({image: emptyImg});
                
                loadingEl.classList.add('hidden');
                startBtn.disabled = false;
                startBtn.textContent = '▶ Iniciar Reconocimiento';
                statusEl.textContent = '🟢 Listo - Presiona el botón';
                console.log('✓ Modelo cargado');
            } catch (error) {
                statusEl.textContent = '❌ Error al cargar modelo: ' + error.message;
                console.error('Error loading model:', error);
            }
        });

        // Crear imagen vacía para inicializar
        function createEmptyImage() {
            const img = document.createElement('canvas');
            img.width = 640;
            img.height = 480;
            const ctx = img.getContext('2d');
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 640, 480);
            return img;
        }
    </script>
</body>
</html>
